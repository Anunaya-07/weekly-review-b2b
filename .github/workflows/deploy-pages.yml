name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          # Stage all HTML files and assets for deployment
          cp -r . /tmp/gh-deploy
          cd /tmp/gh-deploy
          rm -rf .git .github
          git init
          git add .
          git commit -m "Deploy from ${GITHUB_SHA::8}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/Anunaya-07/weekly-review-b2b.git" HEAD:gh-pages
